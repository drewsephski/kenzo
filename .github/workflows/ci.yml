name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run --filter @flux/shared build

      - name: Test
        run: bun test

      - name: Build
        run: BUILD_SHA=${GITHUB_SHA::7} BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) bun run build
