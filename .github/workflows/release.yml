name: Release

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/shared/**'
      - '.github/workflows/release.yml'
      - '.releaserc.json'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/shared/**'
      - '.github/workflows/release.yml'
      - '.releaserc.json'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

concurrency:
  group: release-${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build CLI
        run: bun run build

      - name: Setup Node for semantic-release
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Verify npm package contents
        run: npm pack --dry-run
        working-directory: packages/cli

      - name: Release (dry-run)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Prefer npm trusted publishing (OIDC via id-token: write). NPM_TOKEN is
          # a fallback for repos that have not enabled a trusted publisher yet.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release --dry-run

      - name: Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Prefer npm trusted publishing (OIDC via id-token: write). NPM_TOKEN is
          # a fallback for repos that have not enabled a trusted publisher yet.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
